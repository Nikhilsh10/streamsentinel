version: '3.8'

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: streamsentinel-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: streamsentinel-kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: streamsentinel-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      bash -c "
        echo 'Waiting for Kafka...' &&
        sleep 10 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic sensor-events --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic financial-events --partitions 3 --replication-factor 1 &&
        echo 'Topics created.' &&
        kafka-topics --bootstrap-server kafka:29092 --list
      "

  producer:
    build: ./producer
    container_name: streamsentinel-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP=kafka:29092
      - EVENTS_PER_SECOND=${EVENTS_PER_SECOND:-20}
    volumes:
      - ./producer/src:/app/src

  backend:
    build: ./backend
    container_name: streamsentinel-backend
    ports:
      - "8000:8000"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP=kafka:29092
      - FUSION_THRESHOLD=${FUSION_THRESHOLD:-0.65}
      - IF_WEIGHT=${IF_WEIGHT:-0.6}
      - AE_WEIGHT=${AE_WEIGHT:-0.4}
      - DB_PATH=/app/data/anomalies.db
    volumes:
      - ./backend/src:/app/src
      - ./models:/app/models
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: streamsentinel-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
